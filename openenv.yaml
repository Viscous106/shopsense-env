spec_version: 1
name: shopsense_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: easy
    difficulty: easy
    grader:
      type: deterministic
    description: Single easiest customer. Dominant category has ~60% probability.

  - id: medium
    difficulty: medium
    grader:
      type: deterministic
    description: 3-5 customers with clearest buying patterns. Agent must adapt to different profiles across episodes.

  - id: hard
    difficulty: hard
    grader:
      type: deterministic
    description: All 10 customers including tricky pairs. Requires learning from history, not labels.
